<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Checkbox Sum Example</title>
    <script src="script.js" defer></script>
</head>
<body>

    <h3>เลือกตัวเลือก (เลือกได้หลายอัน):</h3>

    <input type="checkbox" name="opt" value="10"> ตัวเลือก 1 (ค่า 10) <br>
    <input type="checkbox" name="opt" value="20"> ตัวเลือก 2 (ค่า 20) <br>
    <input type="checkbox" name="opt" value="30"> ตัวเลือก 3 (ค่า 30) <br>
    <input type="checkbox" name="opt" value="40"> ตัวเลือก 4 (ค่า 40) <br>

    <button id="confirmBtn">ยืนยัน</button>

    <h3>ผลลัพธ์รวม: <span id="result">0</span></h3>

    <script src="Calculation.js"></script>
</body>
</html>
