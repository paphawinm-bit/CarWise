<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Personality Quiz</title>
<link rel="stylesheet" href="quiz.css">

<style>
/* ===== Google Form Style (Desktop First) ===== */

body{
margin:0;
font-family:'Prompt', Arial, sans-serif;
background:#081a36;
color:white;
}

.page{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;
}

/* BIG QUESTION BOX LIKE GOOGLE FORM */
.form-grid{
display:flex;
flex-direction:column;
gap:25px;
width:100%;
max-width:800px;
}

.card{
background:#0f2a4a;
padding:30px;
border-radius:15px;
text-align:left;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.card h3{
color:#66c0ff;
font-size:20px;
margin-bottom:15px;
}

.card label{
display:block;
margin:10px 0;
font-size:16px;
cursor:pointer;
}

/* BUTTONS CENTER */
.calc-btn, .back-btn{
margin-top:20px;
padding:15px 40px;
font-size:18px;
border-radius:30px;
cursor:pointer;
width:100%;
max-width:400px;
}

.calc-btn{
background:#3fa9ff;
border:none;
color:white;
}

.calc-btn:hover{
background:#5bb6ff;
}

.back-btn{
background:transparent;
border:1px solid #3fa9ff;
color:#3fa9ff;
}

.back-btn:hover{
background:#3fa9ff;
color:white;
}

.result-box{
margin-top:30px;
background:#0f2a4a;
padding:30px;
border-radius:15px;
width:100%;
max-width:700px;
font-size:20px;
line-height:1.6;
}

.hidden{
display:none;
}

/* ===== MOBILE (keep same style, just smaller) ===== */
@media (max-width:768px){

.page{
padding:20px 10px;
}

.card{
padding:20px;
}

.card h3{
font-size:18px;
}

.card label{
font-size:15px;
}

.calc-btn, .back-btn{
font-size:16px;
padding:12px;
}

}

/* ===== Mobile Adjust ===== */
@media (max-width:600px){

h1{
font-size:22px;
}

.card{
padding:15px;
}

}

</style>

</head>

<body>

<!-- QUIZ PAGE -->
<div id="quizPage" class="page">

<h1>🚗 คำถามเพื่อหารถที่เหมาะกับคุณ</h1>
<p>ตอบคำถามเพื่อค้นหารถที่เหมาะกับคุณ</p>

<div class="form-grid">

<div class="card">
<h3>คุณใช้รถบ่อยแค่ไหน</h3>
<label><input type="radio" name="use" value="city"> ใช้ทุกวัน</label>
<label><input type="radio" name="use" value="city"> ใช้เกือบทุกวัน</label>
<label><input type="radio" name="use" value="comfort"> ใช้วันหยุด</label>
</div>

<div class="card">
<h3>คุณขับรถกี่กิโลเมตรต่อวัน</h3>
<label><input type="radio" name="distance" value="city"> ต่ำกว่า 10 กม.</label>
<label><input type="radio" name="distance" value="eco"> 10-30 กม.</label>
<label><input type="radio" name="distance" value="performance"> มากกว่า 30 กม.</label>
</div>

<div class="card">
<h3>จุดประสงค์หลัก</h3>
<label><input type="radio" name="purpose" value="city"> ไปทำงาน</label>
<label><input type="radio" name="purpose" value="performance"> ธุรกิจ</label>
<label><input type="radio" name="purpose" value="suv"> ท่องเที่ยว</label>
<label><input type="radio" name="purpose" value="family"> ครอบครัว</label>
</div>

<div class="card">
<h3>สไตล์การขับ</h3>
<label><input type="radio" name="style" value="comfort"> สบาย</label>
<label><input type="radio" name="style" value="performance"> เร็ว</label>
<label><input type="radio" name="style" value="safety"> ปลอดภัย</label>
<label><input type="radio" name="style" value="eco"> ประหยัด</label>
</div>

<div class="card">
<h3>จำนวนผู้โดยสาร</h3>
<label><input type="radio" name="passengers" value="city"> คนเดียว</label>
<label><input type="radio" name="passengers" value="comfort"> 2-3 คน</label>
<label><input type="radio" name="passengers" value="family"> 4+ คน</label>
</div>

<div class="card">
<h3>เทคโนโลยี</h3>
<label><input type="radio" name="tech" value="technology"> ชอบมาก</label>
<label><input type="radio" name="tech" value="technology"> ปานกลาง</label>
<label><input type="radio" name="tech" value="comfort"> ไม่สนใจ</label>
</div>

<div class="card">
<h3>ค่าใช้จ่าย</h3>
<label><input type="radio" name="cost" value="eco"> สำคัญมาก</label>
<label><input type="radio" name="cost" value="comfort"> ปานกลาง</label>
<label><input type="radio" name="cost" value="performance"> ไม่สำคัญ</label>
</div>

<div class="card">
<h3>รถไฟฟ้า</h3>
<label><input type="radio" name="ev" value="eco"> สนใจ</label>
<label><input type="radio" name="ev" value="eco"> ลังเล</label>
<label><input type="radio" name="ev" value="performance"> ไม่สนใจ</label>
</div>

<div class="card">
<h3>บุคลิก</h3>
<label><input type="radio" name="personality" value="eco"> เรียบง่าย</label>
<label><input type="radio" name="personality" value="comfort"> สบาย</label>
<label><input type="radio" name="personality" value="performance"> ลุย</label>
<label><input type="radio" name="personality" value="technology"> เทคโนโลยี</label>
</div>

<div class="card">
<h3>ดีไซน์</h3>
<label><input type="radio" name="design" value="comfort"> หรู</label>
<label><input type="radio" name="design" value="performance"> สปอร์ต</label>
<label><input type="radio" name="design" value="suv"> ลุย</label>
<label><input type="radio" name="design" value="technology"> โมเดิร์น</label>
</div>

</div>

<button class="calc-btn" onclick="calculateQuiz()">ดูผลลัพธ์</button>
<button class="back-btn" onclick="window.location.href='index.html'">⬅ กลับหน้า CarWise</button>

</div>

<!-- RESULT PAGE -->
<div id="resultPage" class="page hidden">

<h1>🚗 ผลลัพธ์ของคุณ</h1>
<div id="quizResult" class="result-box"></div>

<button class="calc-btn" onclick="goBack()">🔄 ทำใหม่</button>
<button class="back-btn" onclick="window.location.href='index.html'">⬅ กลับหน้า CarWise</button>

</div>

<script src="quiz.js"></script>

</body>
</html>
